name: Refresh Lineage Data

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:          # Manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyodbc

      - name: Install ODBC Driver
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      # ── Optional step: refresh semantic model lineage ──
      # Requires Service Principal with:
      #   1. Fabric API scope: Item.ReadWrite.All (or workspace contributor)
      #   2. Processing WH grants: INSERT + DELETE on Meta.LineageEdge + Meta.SemanticModelContract
      # If SP lacks either, this step fails gracefully (continue-on-error) — manual
      # refresh via tools/build_semantic_model_lineage.py keeps Meta tables in sync.
      # The existing CSV export below will pick up edges regardless of this step's outcome.
      - name: Refresh Semantic Model Lineage (discover Gold → SemanticModel edges)
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          FABRIC_SERVER: ${{ secrets.FABRIC_SERVER }}
        run: |
          python << 'EOF'
          import os, json, struct, base64, time, re, urllib.request, pyodbc
          from urllib.request import Request, urlopen
          from datetime import datetime, timezone

          tenant = os.environ["AZURE_TENANT_ID"]
          client_id = os.environ["AZURE_CLIENT_ID"]
          client_secret = os.environ["AZURE_CLIENT_SECRET"]
          server = os.environ["FABRIC_SERVER"]
          WORKSPACE_ID = "c8d9fc83-18b6-4e1d-8264-0b49eed36fe0"
          GOLD_WH_ID = "98e2a911-5af9-442e-9cc8-5d8dadb8b762"

          def get_token(scope):
              url = f"https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token"
              data = f"grant_type=client_credentials&client_id={client_id}&client_secret={client_secret}&scope={scope}"
              return json.loads(urlopen(Request(url, data=data.encode(), method="POST",
                  headers={"Content-Type":"application/x-www-form-urlencoded"})).read().decode())["access_token"]

          fab_token = get_token("https://api.fabric.microsoft.com/.default")
          sql_token = get_token("https://database.windows.net/.default")

          # Discover semantic models that consume Gold WH
          def fab_get(path):
              return json.loads(urlopen(Request(f"https://api.fabric.microsoft.com{path}",
                  headers={"Authorization": f"Bearer {fab_token}"})).read())

          models = fab_get(f"/v1/workspaces/{WORKSPACE_ID}/semanticModels").get("value", [])
          discovered = []
          for sm in models:
              try:
                  req = Request(f"https://api.fabric.microsoft.com/v1/workspaces/{WORKSPACE_ID}/semanticModels/{sm['id']}/getDefinition?format=TMDL",
                      method="POST", headers={"Authorization": f"Bearer {fab_token}", "Content-Length": "0"})
                  resp = urlopen(req)
                  if resp.status != 202: continue
                  op = resp.headers.get("x-ms-operation-id")
                  for _ in range(30):
                      time.sleep(2)
                      d = fab_get(f"/v1/operations/{op}")
                      if d.get("status") == "Succeeded":
                          parts = fab_get(f"/v1/operations/{op}/result").get("definition",{}).get("parts",[])
                          urls, tbls = [], []
                          for p in parts:
                              c = base64.b64decode(p.get("payload","")).decode("utf-8", errors="replace") if p.get("payloadType")=="InlineBase64" else p.get("payload","")
                              if p["path"].endswith("expressions.tmdl"):
                                  urls += re.findall(r'AzureStorage\.DataLake\("([^"]+)"', c)
                              if p["path"].endswith(".tmdl") and "/tables/" in p["path"]:
                                  for pm in re.finditer(r"partition\s+\S+\s+=\s+entity\s*\n((?:\s+.+\n)+)", c, re.MULTILINE):
                                      body = pm.group(1)
                                      em = re.search(r"entityName:\s*(\S+)", body)
                                      sm_ = re.search(r"schemaName:\s*(\S+)", body)
                                      mm = re.search(r"mode:\s*(\S+)", body)
                                      if em: tbls.append({"entity":em.group(1),"schema":sm_.group(1) if sm_ else None,"mode":mm.group(1) if mm else "unknown"})
                          if any(GOLD_WH_ID in u for u in urls):
                              for t in tbls: discovered.append({**t, "model_name": sm["displayName"], "model_id": sm["id"]})
                          break
                      if d.get("status") == "Failed": break
              except Exception as e: print(f"  skip {sm.get('displayName')}: {e}")

          print(f"Discovered {len(discovered)} (gold_table × semantic_model) pairs")

          # Write to Meta tables
          tb = sql_token.encode("UTF-16-LE")
          ts = struct.pack(f"<I{len(tb)}s", len(tb), tb)
          conn = pyodbc.connect(f"DRIVER={{ODBC Driver 18 for SQL Server}};SERVER={server};DATABASE=SupplyChain_Processing_Warehouse;Encrypt=yes;TrustServerCertificate=no", attrs_before={1256: ts})
          conn.autocommit = True
          c = conn.cursor()
          c.execute("DELETE FROM Meta.LineageEdge WHERE edge_type='semantic'")
          for d in discovered:
              gold_id = f"{d['schema']}.{d['entity']}"
              sm_id = f"SemanticModel.{d['model_name']}"
              eid = f"semantic::{d['model_name']}::{d['entity']}"
              c.execute("INSERT INTO Meta.LineageEdge (edge_id, source_asset, target_asset, edge_type, transform_type, is_synthetic, created_at_utc, notes) VALUES (?,?,?,'semantic',?,0,SYSUTCDATETIME(),?)",
                  eid, gold_id, sm_id, d["mode"], f"GH Action auto-discover, model_id={d['model_id']}")
              c.execute("DELETE FROM Meta.SemanticModelContract WHERE contract_id=?", eid)
              c.execute("INSERT INTO Meta.SemanticModelContract (contract_id, gold_asset_id, semantic_model_name, source_mode, direct_lake_required, fallback_allowed, validation_status, last_validated_utc, notes) VALUES (?,?,?,?,?,0,'discovered',SYSUTCDATETIME(),?)",
                  eid, gold_id, d["model_name"], d["mode"], 1 if d["mode"]=="directLake" else 0, f"GH Action auto-discover, model_id={d['model_id']}")
          conn.close()
          print(f"  ✓ Wrote {len(discovered)} edges + contracts")
          EOF

      - name: Get Azure Token & Export CSVs
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          FABRIC_SERVER: ${{ secrets.FABRIC_SERVER }}
        run: |
          python << 'EOF'
          import pyodbc, struct, csv, os, json
          from urllib.request import Request, urlopen

          # Get token via Service Principal
          tenant = os.environ["AZURE_TENANT_ID"]
          client_id = os.environ["AZURE_CLIENT_ID"]
          client_secret = os.environ["AZURE_CLIENT_SECRET"]
          server = os.environ["FABRIC_SERVER"]

          token_url = f"https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token"
          data = f"grant_type=client_credentials&client_id={client_id}&client_secret={client_secret}&scope=https://database.windows.net/.default"
          req = Request(token_url, data=data.encode(), method="POST",
                        headers={"Content-Type": "application/x-www-form-urlencoded"})
          token = json.loads(urlopen(req).read().decode())["access_token"]
          token_bytes = token.encode("UTF-16-LE")
          token_struct = struct.pack(f"<I{len(token_bytes)}s", len(token_bytes), token_bytes)

          conn = pyodbc.connect(
              f"DRIVER={{ODBC Driver 18 for SQL Server}};SERVER={server};"
              f"DATABASE=SupplyChain_Processing_Warehouse;Encrypt=yes;TrustServerCertificate=no;",
              attrs_before={1256: token_struct})
          cursor = conn.cursor()

          data_dir = "01_Architect_v9_April/lineage_explorer/data"

          # Export lineage — edges already use physical names (no mapping needed)
          def split_name(name):
              if '.' in name:
                  parts = name.split('.', 1)
                  return parts[0], parts[1]
              return name, name

          cursor.execute("SELECT source_asset, target_asset, edge_type FROM Meta.LineageEdge ORDER BY target_asset, source_asset")
          rows = cursor.fetchall()
          with open(f"{data_dir}/lineage.csv", "w", newline="") as f:
              w = csv.writer(f)
              w.writerow(["lineage_id","source_schema","source_table","target_schema","target_table","relationship_type","sp_name"])
              for i, r in enumerate(rows, 1):
                  ss, st = split_name(r[0])
                  ts, tt = split_name(r[1])
                  w.writerow([i, ss, st, ts, tt, r[2], r[1]])

          # Export registry with physical names
          cursor.execute("""
              SELECT physical_schema + '.' + physical_object AS sp_name,
                  legacy_view_name AS view_name,
                  physical_schema AS target_schema,
                  physical_object AS target_table,
                  canonical_layer AS layer,
                  load_type, frequency,
                  CASE WHEN source_objects IS NOT NULL THEN 1 ELSE 0 END AS execution_order,
                  depends_on, source_objects, is_active
              FROM Meta.AssetRegistry WHERE is_active = 1
              ORDER BY canonical_layer, physical_schema, physical_object
          """)
          cols = [d[0] for d in cursor.description]
          rows = cursor.fetchall()
          with open(f"{data_dir}/registry.csv", "w", newline="") as f:
              w = csv.writer(f)
              w.writerow(cols)
              for r in rows:
                  row = list(r)
                  w.writerow(row)

          # Export views (v10: from sys.sql_modules via cross-DB)
          cursor.execute("""
              SELECT s.name AS [schema], v.name AS view_name,
                  LEFT(m.definition, 4000) AS definition
              FROM sys.views v
              JOIN sys.schemas s ON v.schema_id = s.schema_id
              JOIN sys.sql_modules m ON v.object_id = m.object_id
              WHERE s.name NOT IN ('sys','queryinsights')
              ORDER BY s.name, v.name
          """)
          cols = [d[0] for d in cursor.description]
          rows = cursor.fetchall()
          with open(f"{data_dir}/views.csv", "w", newline="") as f:
              w = csv.writer(f)
              w.writerow(cols)
              w.writerows(rows)

          # Export run history (v10: Meta.RunLog)
          cursor.execute("""
              SELECT TOP 50 asset_id AS sp_name, status, rows_loaded AS rows_affected,
                  DATEDIFF(SECOND, start_time_utc, COALESCE(end_time_utc, start_time_utc)) AS duration_seconds,
                  start_time_utc AS start_time, load_type
              FROM Meta.RunLog WHERE status = 'success'
              ORDER BY start_time_utc DESC
          """)
          cols = [d[0] for d in cursor.description]
          rows = cursor.fetchall()
          with open(f"{data_dir}/run_history.csv", "w", newline="") as f:
              w = csv.writer(f)
              w.writerow(cols)
              w.writerows(rows)

          conn.close()
          print("CSVs exported successfully")
          EOF

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add 01_Architect_v9_April/lineage_explorer/data/
          git diff --cached --quiet || (git commit -m "Auto-refresh lineage data [skip ci]" && git push)
